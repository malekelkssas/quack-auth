name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 11.5.2
          run_install: false

      # Uncomment to enable Nx Cloud task distribution:
      # - run: pnpm dlx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="check"

      # pnpm 11.5.2 requires Node.js >= 22.13 (uses node:sqlite).
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v5

      # Same verification as Husky pre-commit step 2 (.husky/pre-commit → pnpm check).
      # lint-staged (step 1) auto-fixes staged files locally; CI uses format:check on the full tree instead.
      - run: pnpm check

      # TODO — enable when BE unit tests exist (do not forget):
      # - run: pnpm nx run-many -t test --all --exclude=quack-auth

      # TODO — enable when FE E2E is set up, if runtime is acceptable on CI:
      # - run: pnpm nx run FE:e2e

      - run: pnpm exec nx fix-ci
        if: always()
