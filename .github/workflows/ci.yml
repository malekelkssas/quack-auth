name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 11.5.2
          run_install: false

      # Uncomment to enable Nx Cloud task distribution:
      # - run: pnpm dlx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="check"

      # pnpm 11.5.2 requires Node.js >= 22.13 (uses node:sqlite).
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v5

      # Husky pre-commit: lint-staged + pnpm check. CI adds full builds (too slow for every commit).
      - run: pnpm ci

      # TODO — enable when FE E2E is set up, if runtime is acceptable on CI:
      # - run: pnpm nx run FE:e2e

      - run: pnpm exec nx fix-ci
        if: always()
